name: Build Windows x64

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ELECTRON_VERSION: 41.0.2
  LADYBUG_TARGET_ARCH: x64
  LADYBUG_BUILD_JOBS: 4
  LADYBUG_NODE_RUNTIME: electron
  LADYBUG_NODE_RUNTIME_VERSION: 41.0.2
  LADYBUG_WORK_ROOT: ${{ github.workspace }}\.cache\ladybug-work

jobs:
  build-windows-x64:
    runs-on: windows-2022
    timeout-minutes: 120
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out build repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install JavaScript dependencies
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
        run: npm ci

      - name: Restore verified release bundle
        id: bundle-cache
        uses: actions/cache/restore@v6
        with:
          path: dist
          key: ladybug-bundle-win32-x64-electron-41.0.2-v0.18.1-p5-${{ hashFiles('package.json', 'package-lock.json', 'scripts/build-native.mjs', 'patches/*.patch') }}

      - name: Inspect verified release bundle
        id: cached-bundle
        run: |
          $available = 'false'
          if (Test-Path 'dist/manifest.json') {
            try {
              npm run verify
              if ($LASTEXITCODE -eq 0) {
                $available = 'true'
              }
            } catch {
              Write-Warning "Cached release bundle is invalid: $_"
            }
            if ($available -ne 'true') {
              Remove-Item dist -Recurse -Force
            }
          }
          "available=$available" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore incremental CMake build
        id: cmake-cache
        if: ${{ startsWith(github.ref, 'refs/tags/') || steps.cached-bundle.outputs.available != 'true' }}
        uses: actions/cache/restore@v6
        with:
          path: .cache/ladybug-work
          key: ladybug-cmake-win32-x64-electron-41.0.2-v0.18.1-p5-${{ hashFiles('package.json', 'package-lock.json', 'scripts/build-native.mjs', 'patches/*.patch') }}

      - name: Materialize cached native build
        id: cached-native
        if: ${{ !startsWith(github.ref, 'refs/tags/') && steps.cached-bundle.outputs.available != 'true' }}
        run: |
          $available = 'false'
          $cachedNative = '.cache/ladybug-work/ladybug/tools/nodejs_api/build/lbugjs.node'
          if (Test-Path $cachedNative) {
            node scripts/build-native.mjs --stage-existing
            npm run verify
            if ($LASTEXITCODE -eq 0) {
              $available = 'true'
            }
          }
          "available=$available" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore OpenSSL cache
        if: ${{ startsWith(github.ref, 'refs/tags/') || (steps.cached-bundle.outputs.available != 'true' && steps.cached-native.outputs.available != 'true') }}
        uses: actions/cache@v6
        with:
          path: |
            C:\vcpkg\installed\x64-windows-static-md
            C:\vcpkg\packages\openssl_x64-windows-static-md
          key: ${{ runner.os }}-vcpkg-openssl-x64-windows-static-md-v1

      - name: Prepare native toolchain
        if: ${{ startsWith(github.ref, 'refs/tags/') || (steps.cached-bundle.outputs.available != 'true' && steps.cached-native.outputs.available != 'true') }}
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstallation = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (!$vsInstallation) {
            throw 'Visual Studio C++ x64 toolchain is unavailable'
          }

          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (!$vcpkgRoot) {
            $vcpkgRoot = 'C:\vcpkg'
          }
          & (Join-Path $vcpkgRoot 'vcpkg.exe') install 'openssl:x64-windows-static-md'
          if ($LASTEXITCODE -ne 0) {
            throw "vcpkg failed with exit code $LASTEXITCODE"
          }

          $opensslRoot = Join-Path $vcpkgRoot 'installed\x64-windows-static-md'
          if (!(Test-Path (Join-Path $opensslRoot 'include\openssl\opensslv.h'))) {
            throw "OpenSSL headers are unavailable: $opensslRoot"
          }

          cmake --version
          ninja --version
          "VS_INSTALLATION_PATH=$vsInstallation" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CMAKE_PREFIX_PATH=$opensslRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENSSL_ROOT_DIR=$opensslRoot" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build LadybugDB with Jieba FTS
        id: native-build
        if: ${{ startsWith(github.ref, 'refs/tags/') || (steps.cached-bundle.outputs.available != 'true' && steps.cached-native.outputs.available != 'true') }}
        continue-on-error: true
        shell: cmd
        run: |
          call "%VS_INSTALLATION_PATH%\VC\Auxiliary\Build\vcvars64.bat"
          npm run build:native

      - name: Require successful native build
        if: ${{ (startsWith(github.ref, 'refs/tags/') || (steps.cached-bundle.outputs.available != 'true' && steps.cached-native.outputs.available != 'true')) && steps.native-build.outcome != 'success' }}
        run: throw 'LadybugDB native build failed; the incremental build cache was preserved.'

      - name: Verify bundle metadata
        run: npm run verify

      - name: Save verified release bundle
        if: ${{ steps.bundle-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v6
        with:
          path: dist
          key: ${{ steps.bundle-cache.outputs.cache-primary-key }}

      - name: Save incremental CMake build
        if: ${{ steps.native-build.outcome == 'success' && steps.cmake-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v6
        with:
          path: .cache/ladybug-work
          key: ${{ steps.cmake-cache.outputs.cache-primary-key }}

      - name: Inspect Windows native dependencies
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstallation = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $dumpbin = Get-ChildItem (Join-Path $vsInstallation 'VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe') |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (!$dumpbin) {
            throw 'dumpbin.exe is unavailable'
          }
          $dependencies = (& $dumpbin.FullName /DEPENDENTS dist\win32-x64\lbugjs.node) -join "`n"
          $dependencies
          $normalDependencies = [regex]::Match(
            $dependencies,
            '(?s)Image has the following dependencies:(.*?)Image has the following delay load dependencies:'
          )
          if (!$normalDependencies.Success -or $normalDependencies.Groups[1].Value -match '(?i)node\.exe') {
            throw 'node.exe must not be a normal LadybugDB dependency'
          }
          if ($dependencies -notmatch '(?is)delay load dependencies:.*node\.exe') {
            throw 'node.exe must be delay-loaded for Electron compatibility'
          }
          & $dumpbin.FullName /IMPORTS dist\win32-x64\lbugjs.node |
            Select-String -Pattern 'electron|node\.exe|node\.dll|delayimp' -CaseSensitive:$false

      - name: Create release bundle
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $archive = "artifacts/chronnote-ladybug-win32-x64-v0.18.1-p5-electron-$env:ELECTRON_VERSION.zip"
          Compress-Archive -Path dist\* -DestinationPath $archive -CompressionLevel Optimal
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksum = "$hash  $(Split-Path $archive -Leaf)`n"
          [IO.File]::WriteAllText(
            (Join-Path $PWD 'artifacts\SHA256SUMS'),
            $checksum,
            [Text.UTF8Encoding]::new($false)
          )

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v7
        with:
          name: chronnote-ladybug-win32-x64-v0.18.1-p5-electron-${{ env.ELECTRON_VERSION }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 7

      - name: Smoke test in Node.js
        run: npm run smoke:native

      - name: Smoke test in Electron
        run: |
          $electron = Join-Path $PWD 'node_modules\electron\dist\electron.exe'
          if (!(Test-Path $electron)) {
            throw "Electron executable is unavailable: $electron"
          }
          $env:ELECTRON_RUN_AS_NODE = '1'
          $electronProcess = Start-Process `
            -FilePath $electron `
            -ArgumentList 'scripts/smoke-native.cjs', 'electron-persistence' `
            -NoNewWindow `
            -PassThru `
            -Wait
          if ($electronProcess.ExitCode -ne 0) {
            throw "Electron smoke test failed with exit code $($electronProcess.ExitCode)"
          }

      - name: Publish tagged release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME artifacts/* `
            --repo $env:GITHUB_REPOSITORY `
            --verify-tag `
            --title "Chronnote LadybugDB $env:GITHUB_REF_NAME" `
            --notes "Reproducible Windows x64 LadybugDB runtime for Electron $env:ELECTRON_VERSION. The release was verified with three-process WAL crash recovery in Node.js and Jieba FTS persistence in Electron."
